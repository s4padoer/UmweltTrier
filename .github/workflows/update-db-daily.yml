name: Update Supabase DB (Niederschlag, Temperatur, Luft)
on:
  schedule:
    - cron: '0 2 * * *'  # Täglich um 2 Uhr UTC
  workflow_dispatch:  # Manuell triggern
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      uses: astral-sh/uv@v3
      with:
        enable-cache: true
        version: latest
    - name: Run update script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: uv run python -m umwelttrier.apis.api_pegelonline.py
           uv run python -m umwelttrier.apis.api_umweltbundesamt.py
           uv run python -m umwelttrier.apis.api_wetterdienst_niederschlag.py
           uv run python -m umwelttrier.apis.api_wetterdienst_temperatur.py
    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}