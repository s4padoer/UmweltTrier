[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "umwelttrier"
version = "0.1.0"
description = "Eine Datenbank mit Umweltdaten fuer Trier, die regelmaessig updated und Daten visualisiert."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "auto-mix-prep==0.2.0",
    "dash==4.1.0",
    "dash-leaflet==1.1.3",
    "eodag==4.1.0",
    "numpy==2.4.4",
    "pandas==3.0.2",
    "plotly==6.7.0",
    "plotly-express==0.4.1",
    "polars==1.40.1",
    "pyproj==3.7.2",
    "python-dotenv==1.2.2",
    "pyyaml==6.0.3",
    "rasterio==1.5.0",
    "requests==2.33.1",
    "shapely==2.1.2",
    "sqlalchemy==2.0.49",
    "psycopg2-binary==2.9.10",
    "sshtunnel==0.4.0",
    "wetterdienst==0.120.0",
    "flask>=3.1.3",
    "gunicorn>=25.3.0",
]

[project.scripts]
app = "umwelttrier.main:app"

[tool.vercel.scripts]
build = "python -m umwelttrier.main"

[dependency-groups]
dev = [
    "pipdeptree>=2.35.2",
    "ruff>=0.0.0",
]

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "C90", "N", "TID"]
exclude = ["__pycache__", ".venv", "build", "dist", ".git"]
target-version = "py312"
